<!DOCTYPE html>
<html lang="ko"><head><meta charset="UTF-8"><title>Semantic type</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>body{margin:0;padding:20px;background:var(--bg-page);} h1,h2,h3,p{margin:0 0 10px;} .anchor{color:var(--fg-muted);margin-right:6px;}</style></head>
<body>
  <h1>Git HEAD</h1>
  <h2><span class="anchor">#</span>커밋할 때 HEAD가 움직이는 방식</h2>
  <p>HEAD는 현재 작업 위치를 가리키는 특수한 포인터다. 실제로는 <code>.git/HEAD</code>라는 파일 하나로 존재한다.</p>
  <h3>이중 참조 구조</h3>
  <p style="font-size:var(--fs-sm)">본문 기본 <code>fs-base 16</code>, 블로그 프로즈는 <code>fs-lg 18 / line-height 1.8</code>로 승격.</p>
</body></html>
