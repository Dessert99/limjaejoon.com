<!DOCTYPE html>
<html lang="ko"><head><meta charset="UTF-8"><title>Cards</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body{margin:0;padding:18px;background:var(--bg-page);display:grid;grid-template-columns:1fr 1fr;gap:14px;font-family:var(--font-sans);}

  .card{
    position:relative;isolation:isolate;overflow:hidden;
    border:1px solid var(--line-soft);border-radius:var(--r-lg);
    background:var(--bg-surface);box-shadow:var(--shadow-card-sm);
    padding:16px 18px;display:flex;flex-direction:column;gap:6px;
    transition:transform .25s cubic-bezier(.2,.8,.2,1),border-color .25s ease,box-shadow .25s ease;
    --mx:50%;--my:50%;
  }

  /* spotlight that follows the pointer (mx/my set via JS) */
  .card::before{
    content:"";position:absolute;inset:-1px;border-radius:inherit;pointer-events:none;z-index:0;
    background:radial-gradient(240px circle at var(--mx) var(--my),
      color-mix(in oklab,var(--accent-strong) 14%,transparent) 0%,
      transparent 60%);
    opacity:0;transition:opacity .3s ease;
  }
  /* accent hairline along the top edge, revealed on hover */
  .card::after{
    content:"";position:absolute;left:12px;right:12px;top:0;height:1px;
    background:linear-gradient(90deg,transparent,var(--accent-strong),transparent);
    opacity:0;transform:scaleX(.4);transform-origin:center;
    transition:opacity .3s ease,transform .4s cubic-bezier(.2,.8,.2,1);
    z-index:1;
  }

  .card > *{position:relative;z-index:2;}

  .card.hover,.card:hover{
    transform:translateY(-3px);
    border-color:var(--accent-strong);
    box-shadow:var(--shadow-card-md),0 0 0 4px color-mix(in oklab,var(--accent-strong) 10%,transparent);
  }
  .card.hover::before,.card:hover::before{opacity:1;}
  .card.hover::after,.card:hover::after{opacity:1;transform:scaleX(1);}

  /* corner tick in accent — decorative */
  .corner{
    position:absolute;top:10px;right:10px;width:12px;height:12px;pointer-events:none;z-index:2;
    opacity:0;transform:translate(4px,-4px);transition:opacity .3s ease,transform .3s ease;
  }
  .corner::before,.corner::after{content:"";position:absolute;background:var(--accent-strong);border-radius:1px;}
  .corner::before{top:0;right:0;width:12px;height:1.5px;}
  .corner::after{top:0;right:0;width:1.5px;height:12px;}
  .card.hover .corner,.card:hover .corner{opacity:1;transform:translate(0,0);}

  .name{font-size:var(--fs-lg);font-weight:600;color:var(--fg-primary);margin:0;letter-spacing:-0.01em;}
  .period{font-size:var(--fs-sm);color:var(--fg-muted);font-family:var(--font-mono);font-feature-settings:"tnum";}
  .desc{font-size:var(--fs-sm);color:var(--fg-secondary);line-height:1.6;margin:0;}
  .row{display:flex;justify-content:space-between;align-items:baseline;}
  .chips{display:flex;flex-wrap:wrap;gap:6px;list-style:none;padding:0;margin:6px 0 0;}
  .chip{font-size:var(--fs-xs);color:var(--fg-secondary);border:1px solid var(--line-soft);border-radius:var(--r-full);padding:2px 8px;background:var(--bg-soft);transition:border-color .2s ease,color .2s ease;}
  .card.hover .chip,.card:hover .chip{border-color:color-mix(in oklab,var(--accent-strong) 40%,var(--line-soft));}

  .hint{
    position:absolute;top:10px;left:14px;font-size:9px;color:var(--accent-strong);
    font-family:var(--font-mono);letter-spacing:var(--ls-cap);text-transform:uppercase;font-weight:600;
    opacity:.7;z-index:2;
  }
</style></head>
<body>
  <div class="card">
    <span class="corner"></span>
    <span class="hint">idle</span>
    <div class="row"><h3 class="name">forA</h3><span class="period">2025.09 — 2026.03</span></div>
    <p class="desc">ADHD 커뮤니티 플랫폼</p>
    <ul class="chips"><li class="chip">React Native</li><li class="chip">Expo</li></ul>
  </div>
  <div class="card hover" style="--mx:70%;--my:35%;">
    <span class="corner"></span>
    <span class="hint">hover</span>
    <div class="row"><h3 class="name">PageLabs</h3><span class="period">2025.04 — 현재</span></div>
    <p class="desc">ERP 서비스 개발</p>
    <ul class="chips"><li class="chip">Next.js</li><li class="chip">React.js</li></ul>
  </div>

<script>
  // Pointer spotlight: update --mx/--my as a CSS custom prop
  document.querySelectorAll('.card').forEach((el) => {
    el.addEventListener('pointermove', (e) => {
      const r = el.getBoundingClientRect();
      el.style.setProperty('--mx', ((e.clientX - r.left) / r.width * 100) + '%');
      el.style.setProperty('--my', ((e.clientY - r.top) / r.height * 100) + '%');
    });
  });
</script>
</body></html>
