<!DOCTYPE html>
<html lang="ko"><head><meta charset="UTF-8"><title>Radii</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body{margin:0;padding:24px;background:var(--bg-page);}
  .row{display:flex;gap:14px;align-items:flex-end;}
  .item{text-align:center;}
  .box{width:72px;height:56px;background:var(--bg-elevated);border:1px solid var(--line-strong);}
  .pill{width:110px;height:32px;background:var(--accent-soft);border:1px solid var(--accent-strong);color:var(--accent-strong);display:inline-flex;align-items:center;justify-content:center;font-size:var(--fs-xs);font-weight:600;}
  .t{font-family:var(--font-mono);font-size:10px;color:var(--fg-muted);margin-top:6px;}
  .v{font-family:var(--font-mono);font-size:10px;color:var(--fg-primary);}
</style></head>
<body>
<div class="row">
  <div class="item"><div class="box" style="border-radius:var(--r-md)"></div><div class="t">md</div><div class="v">6px</div></div>
  <div class="item"><div class="box" style="border-radius:var(--r-lg)"></div><div class="t">lg</div><div class="v">8px</div></div>
  <div class="item"><div class="box" style="border-radius:var(--r-xl)"></div><div class="t">xl</div><div class="v">12px</div></div>
  <div class="item"><div class="box" style="border-radius:var(--r-2xl)"></div><div class="t">2xl</div><div class="v">16px</div></div>
  <div class="item"><div class="pill" style="border-radius:var(--r-full)">Next.js</div><div class="t">full</div><div class="v">9999px</div></div>
</div>
</body></html>
