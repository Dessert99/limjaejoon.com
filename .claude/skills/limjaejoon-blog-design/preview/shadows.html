<!DOCTYPE html>
<html lang="ko"><head><meta charset="UTF-8"><title>Shadows</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body{margin:0;padding:28px 24px;background:var(--bg-page);display:flex;gap:22px;}
  .card{width:180px;height:90px;background:var(--bg-surface);border:1px solid var(--line-soft);border-radius:var(--r-lg);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:4px;}
  .n{font-size:var(--fs-sm);font-weight:600;color:var(--fg-primary);}
  .v{font-family:var(--font-mono);font-size:10px;color:var(--fg-muted);}
  .sm{box-shadow:var(--shadow-card-sm);}
  .md{box-shadow:var(--shadow-card-md);}
  .glow{box-shadow:0 0 8px var(--accent-soft);border-color:var(--accent-strong);}
</style></head>
<body>
  <div class="card sm"><span class="n">card-sm</span><span class="v">0 1 3 / .24</span></div>
  <div class="card md"><span class="n">card-md</span><span class="v">0 10 28 / .36</span></div>
  <div class="card glow"><span class="n">tooltip glow</span><span class="v">0 0 8 accent</span></div>
</body></html>
