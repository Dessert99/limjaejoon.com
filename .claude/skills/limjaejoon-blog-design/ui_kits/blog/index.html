<!DOCTYPE html>
<html lang="ko" class="">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>임재준 | 프론트엔드 개발자 — UI Kit</title>
<link rel="stylesheet" href="kit.css"/>
</head>
<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script type="text/babel" src="Icons.jsx"></script>
<script type="text/babel" src="data.jsx"></script>
<script type="text/babel" src="SiteHeader.jsx"></script>
<script type="text/babel" src="HeroSection.jsx"></script>
<script type="text/babel" src="HomeSections.jsx"></script>
<script type="text/babel" src="BlogPieces.jsx"></script>
<script type="text/babel" src="PostPieces.jsx"></script>

<script type="text/babel">
function App() {
  const [theme, setTheme] = React.useState("dark");
  const [route, setRoute] = React.useState("home"); // home | blog | post | search
  const [activeTags, setActiveTags] = React.useState([]);
  const [currentPost, setCurrentPost] = React.useState(null);
  const [query, setQuery] = React.useState("");
  const [tocActive, setTocActive] = React.useState("overview");

  React.useEffect(() => {
    document.documentElement.classList.remove("light");
    if (theme === "light") document.documentElement.classList.add("light");
  }, [theme]);

  const { profile, experience, activities, education, projects, skills, posts } = window.BlogData;
  const tags = Array.from(new Set(posts.flatMap((p) => p.tags))).sort();

  const toggleTag = (t) => setActiveTags((cur) => cur.includes(t) ? cur.filter(x => x !== t) : [...cur, t]);

  const openPost = (p) => {
    const full = { ...p, content: true };
    setCurrentPost(full);
    setRoute("post");
    window.scrollTo(0, 0);
  };

  const nav = (r) => { setRoute(r); window.scrollTo(0, 0); };

  const headings = [
    { slug: "overview", text: "개요" },
    { slug: "commit", text: "커밋할 때 HEAD가 움직이는 방식" },
    { slug: "detached", text: "Detached HEAD" },
  ];

  const searchResults = React.useMemo(() => {
    const q = query.trim().toLowerCase();
    if (!q) return [];
    return posts.filter((p) =>
      p.title.toLowerCase().includes(q) ||
      p.description.toLowerCase().includes(q) ||
      p.tags.some((t) => t.toLowerCase().includes(q))
    );
  }, [query, posts]);

  return (
    <React.Fragment>
      <SiteHeader theme={theme} onToggleTheme={() => setTheme(t => t === "dark" ? "light" : "dark")}
                  onNav={nav} current={route}/>
      <div className="content-wrapper">
        {route === "home" && (
          <main className="page-home">
            <HeroSection profile={profile}/>
            <Timeline title="경력" items={experience}/>
            <Timeline title="활동" items={activities}/>
            <ProjectsSection projects={projects}/>
            <SkillsSection skills={skills}/>
            <Timeline title="학력" items={education}/>
          </main>
        )}
        {route === "blog" && (
          <main className="page-blog">
            <header className="page-head">
              <h1>지식 모음</h1>
              <p>개념 정리와 레퍼런스를 모아두는 공간입니다.</p>
            </header>
            <div className="blog-layout">
              <TagSidebar tags={tags} active={activeTags}
                          onToggle={toggleTag} onClear={() => setActiveTags([])}/>
              <BlogList posts={posts} activeTags={activeTags} onOpen={openPost}/>
            </div>
          </main>
        )}
        {route === "post" && currentPost && (
          <main className="page-post">
            <PostHeader post={currentPost}/>
            <div className="content-layout">
              <PostBody/>
              <aside className="toc-aside">
                <TOC headings={headings} active={tocActive} onClick={setTocActive}/>
              </aside>
            </div>
          </main>
        )}
        {route === "search" && (
          <main className="page-search">
            <header className="page-head" style={{marginTop:"1rem"}}>
              <h1>검색</h1>
            </header>
            <input className="search-input" type="search" placeholder="제목, 설명, 태그로 검색..."
                   value={query} onChange={(e) => setQuery(e.target.value)} autoFocus
                   aria-label="블로그 검색"/>
            {query.trim().length === 0 ? (
              <p className="empty-text">검색어를 입력해 주세요.</p>
            ) : searchResults.length === 0 ? (
              <p className="empty-text">검색 결과가 없습니다.</p>
            ) : (
              <section className="search-results">
                {searchResults.map((p) => <BlogRow key={p.slug} post={p} onOpen={openPost}/>)}
              </section>
            )}
          </main>
        )}
      </div>
    </React.Fragment>
  );
}

const root = ReactDOM.createRoot(document.getElementById("root"));
root.render(<App/>);
</script>
</body>
</html>
